<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - The Developer's Lounge</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">The Developer's Lounge</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="fade-in">
        <h1>Reserve Your Consultation</h1>
        <p>Interested in discussing a project over a virtual Old Fashioned? Let's connect.</p>
        
        <form id="contact-form">
            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit">Send Invitation</button>
        </form>

        <div class="social-links">
            <h2>Other Ways to Connect:</h2>
            <ul>
                <li><a href="https://linkedin.com/in/yourprofile" target="_blank">LinkedIn</a></li>
                <li><a href="https://github.com/yourusername" target="_blank">GitHub</a></li>
                <li><a href="https://twitter.com/yourusername" target="_blank">Twitter</a></li>
            </ul>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 The Developer's Lounge. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
